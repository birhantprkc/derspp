name: derspp
description: "A study application able to play vector videos with a lot of features."

publish_to: 'none' 

version: 3.0.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  

  provider: ^6.1.5+1

  http: ^1.6.0

  image_picker: ^1.2.1

  skeletonizer: ^2.1.2

  file_picker: ^10.3.8

  dynamic_color: ^1.8.1
  window_manager: ^0.5.1
  drift: ^2.30.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5
  crop_image: ^1.0.16
  image: ^4.7.2
  path: ^1.9.0
  xml: ^6.5.0
  
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  universal_io: ^2.3.1
  
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  audio_decoder: 
    git:
      url: https://github.com/navidicted/audio_decoder.git
      ref: fork/version-compat 
  # using my fork of youtube_explode_dart
  youtube_explode_dart:
    git:
      url: https://github.com/navidicted/youtube_explode_dart.git
      ref: master 
  flutter_colorpicker: ^1.1.0
  url_launcher: ^6.3.2
  fluttertoast: ^9.0.0
  webview_flutter: ^4.13.1
  pdfrx: ^2.2.24
  pdf: ^3.10.0
  
  package_info_plus: ^8.1.2
  open_file: ^3.5.10
  permission_handler: ^11.3.1
  flutter_markdown_plus: ^1.0.1
  flutter_local_notifications: ^17.2.2
  device_info_plus: ^12.4.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.30.0
  build_runner: ^2.10.4
  flutter_launcher_icons: ^0.14.4
flutter:

  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf

  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
        - asset: assets/fonts/NotoSans-Bold.ttf
          weight: 700

flutter_launcher_icons:
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"